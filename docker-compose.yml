services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dms-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=dms
      - POSTGRES_USER=dms_user
      - POSTGRES_PASSWORD=dms_password_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: dms-pgbouncer
    environment:
      - DB_USER=dms_user
      - DB_PASSWORD=dms_password_2026
      - DB_HOST=db
      - DB_NAME=dms
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=50
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
    ports:
      - "6432:6432"
    depends_on:
      - db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: dms-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://dms_user:dms_password_2026@pgbouncer:6432/dms
      - WATCHFILES_FORCE_POLLING=true
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - pgbouncer
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dms-frontend
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
