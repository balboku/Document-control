services:
  db:
    image: ankane/pgvector:latest
    container_name: dms-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=dms
      - POSTGRES_USER=dms_user
      - POSTGRES_PASSWORD=dms_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: dms-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://dms_user:dms_password_2026@db:5432/dms
      - WATCHFILES_FORCE_POLLING=true
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dms-frontend
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
